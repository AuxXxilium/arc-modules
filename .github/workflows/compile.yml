name: Compile Modules

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Toolkit version filter (7.1 / 7.2 / 7.3 / all)'
        required: false
        default: 'all'
        type: string
      platform:
        description: 'Platform filter (e.g. epyc7002 / all)'
        required: false
        default: 'all'
        type: string

jobs:
  prepare:
    name: Prepare matrix from src/PLATFORMS
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      has_entries: ${{ steps.gen.outputs.has_entries }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Generate matrix
        id: gen
        shell: bash
        run: |
          set -euo pipefail

          VERSION_FILTER="${{ github.event.inputs.version || 'all' }}"
          PLATFORM_FILTER="${{ github.event.inputs.platform || 'all' }}"
          FILE="src/PLATFORMS"

          [ -f "${FILE}" ] || { echo "[E] ${FILE} not found"; exit 1; }

          MATRIX='{"include":[]}'
          while read -r PLATFORM KVER TOOLKIT_VER DOCKER_IMAGE; do
            [ -z "${PLATFORM:-}" ] && continue
            case "${PLATFORM}" in \#*) continue ;; esac

            if [ "${VERSION_FILTER}" != "all" ] && [ "${TOOLKIT_VER}" != "${VERSION_FILTER}" ]; then
              continue
            fi

            if [ "${PLATFORM_FILTER}" != "all" ] && [ "${PLATFORM}" != "${PLATFORM_FILTER}" ]; then
              continue
            fi

            MATRIX=$(echo "${MATRIX}" | jq \
              --arg version "${TOOLKIT_VER}" \
              --arg platform "${PLATFORM}" \
              --arg parm "${KVER}" \
              --arg docker_image "${DOCKER_IMAGE}" \
              '.include += [{version:$version,platform:$platform,parm:$parm,docker_image:$docker_image}]')
          done < "${FILE}"

          echo "matrix=$(echo "${MATRIX}" | jq -c)" >> "$GITHUB_OUTPUT"
          if jq -e '.include | length > 0' <<< "${MATRIX}" >/dev/null; then
            echo "has_entries=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_entries=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Matrix:"
          echo "${MATRIX}" | jq .

  build:
    name: Build (${{ matrix.version }} / ${{ matrix.platform }} / ${{ matrix.parm }})
    needs: prepare
    if: ${{ needs.prepare.outputs.has_entries == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Init Env
        run: |
          git config --global user.email "info@auxxxilium.tech"
          git config --global user.name "AuxXxilium"
          sudo timedatectl set-timezone "Europe/Berlin"

      - name: Compile by DOCKER_IMAGE
        shell: bash
        run: |
          set -euo pipefail
          ROOT_PATH=${{ github.workspace }}

          if [[ "${{ matrix.parm }}" == 5* ]]; then
            SRC_DIR="${ROOT_PATH}/src/5.x"
            OUT_NAME="${{ matrix.platform }}-${{ matrix.version }}-${{ matrix.parm }}"
          else
            SRC_DIR="${ROOT_PATH}/src/4.x"
            OUT_NAME="${{ matrix.platform }}-${{ matrix.parm }}"
          fi

          [ -d "${SRC_DIR}" ] || { echo "[E] missing source dir: ${SRC_DIR}"; exit 1; }

          OUTPUT_DIR="${ROOT_PATH}/source/output/${OUT_NAME}"
          mkdir -p "${OUTPUT_DIR}"

          echo "[I] image=${{ matrix.docker_image }} platform=${{ matrix.platform }} kver=${{ matrix.parm }} ver=${{ matrix.version }}"
          docker run -u $(id -u) --rm -t \
            -v "${SRC_DIR}":/input \
            -v "${OUTPUT_DIR}":/output \
            "${{ matrix.docker_image }}" compile-module "${{ matrix.platform }}"

          FILE_COUNT=$(find "${OUTPUT_DIR}" -maxdepth 1 -type f | wc -l)
          echo "[I] output files: ${FILE_COUNT}"
          [ "${FILE_COUNT}" -gt 0 ] || { echo "[E] no output files"; exit 1; }

      - name: Tar to Artifacts
        shell: bash
        run: |
          set -euo pipefail
          ROOT_PATH=${{ github.workspace }}

          if [[ "${{ matrix.parm }}" == 5* ]]; then
            OUT_NAME="${{ matrix.platform }}-${{ matrix.version }}-${{ matrix.parm }}"
            PKG_NAME="${OUT_NAME}.tgz"
          else
            OUT_NAME="${{ matrix.platform }}-${{ matrix.parm }}"
            PKG_NAME="${OUT_NAME}.tgz"
          fi

          OUTPUT_DIR="${ROOT_PATH}/source/output/${OUT_NAME}"
          [ -d "${OUTPUT_DIR}" ] || { echo "[E] missing output dir: ${OUTPUT_DIR}"; exit 1; }

          mkdir -p "${ROOT_PATH}/source"
          tar -zcf "${ROOT_PATH}/source/${PKG_NAME}" -C "${OUTPUT_DIR}" .

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.version }}-${{ matrix.parm }}
          path: |
            ${{ github.workspace }}/source/*.tgz
