name: Compile Modules

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Toolkit version filter (e.g. 7.1 / 7.2 / 7.3 / all)'
        required: false
        default: 'all'
        type: string
      platform:
        description: 'Platform filter (e.g. epyc7002 / all)'
        required: false
        default: 'all'
        type: string

jobs:
  prepare:
    name: Prepare matrix from src/PLATFORMS
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      has_entries: ${{ steps.gen.outputs.has_entries }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Generate matrix
        id: gen
        shell: bash
        run: |
          set -euo pipefail

          VERSION_FILTER="${{ github.event.inputs.version || 'all' }}"
          PLATFORM_FILTER="${{ github.event.inputs.platform || 'all' }}"
          PLATFORMS_FILE="src/PLATFORMS"

          if [ ! -f "${PLATFORMS_FILE}" ]; then
            echo "[E] ${PLATFORMS_FILE} not found"
            exit 1
          fi

          MATRIX='{"include":[]}'

          while read -r PLATFORM KVER TOOLKIT_VER DOCKER_IMAGE; do
            [ -z "${PLATFORM:-}" ] && continue
            case "${PLATFORM}" in \#*) continue ;; esac

            if [ "${VERSION_FILTER}" != "all" ] && [ "${TOOLKIT_VER}" != "${VERSION_FILTER}" ]; then
              continue
            fi

            if [ "${PLATFORM_FILTER}" != "all" ] && [ "${PLATFORM}" != "${PLATFORM_FILTER}" ]; then
              continue
            fi

            MATRIX=$(echo "${MATRIX}" | jq \
              --arg platform "${PLATFORM}" \
              --arg kver "${KVER}" \
              --arg toolkit_ver "${TOOLKIT_VER}" \
              --arg docker_image "${DOCKER_IMAGE}" \
              '.include += [{platform:$platform,kver:$kver,toolkit_ver:$toolkit_ver,docker_image:$docker_image}]')
          done < "${PLATFORMS_FILE}"

          echo "matrix=$(echo "${MATRIX}" | jq -c)" >> "$GITHUB_OUTPUT"
          if jq -e '.include | length > 0' <<< "${MATRIX}" >/dev/null; then
            echo "has_entries=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_entries=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Matrix generated:"
          echo "${MATRIX}" | jq .

  build:
    name: Build (${{ matrix.platform }} / ${{ matrix.toolkit_ver }} / ${{ matrix.kver }})
    needs: prepare
    if: ${{ needs.prepare.outputs.has_entries == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Init Env
        run: |
          git config --global user.email "info@auxxxilium.tech"
          git config --global user.name "AuxXxilium"
          sudo timedatectl set-timezone "Europe/Berlin"

      - name: Compile via src/PLATFORMS docker image
        shell: bash
        run: |
          set -euo pipefail

          ROOT_PATH="${{ github.workspace }}"
          DIR="${{ matrix.kver }}"
          DIR="${DIR%%.*}.x"

          INPUT_DIR="${ROOT_PATH}/src/${DIR}"
          OUTPUT_DIR="${ROOT_PATH}/src/output/${{ matrix.platform }}-${{ matrix.kver }}"

          [ -d "${INPUT_DIR}" ] || { echo "[E] Input dir not found: ${INPUT_DIR}"; exit 1; }
          mkdir -p "${OUTPUT_DIR}"

          echo "[I] docker image: ${{ matrix.docker_image }}"
          echo "[I] platform: ${{ matrix.platform }}"
          echo "[I] kernel: ${{ matrix.kver }}"
          echo "[I] toolkit: ${{ matrix.toolkit_ver }}"

          docker run -u "$(id -u)" --rm -t \
            -v "${INPUT_DIR}":/input \
            -v "${OUTPUT_DIR}":/output \
            "${{ matrix.docker_image }}" compile-module "${{ matrix.platform }}"

          FILE_COUNT=$(find "${OUTPUT_DIR}" -maxdepth 1 -type f | wc -l)
          echo "[I] output file count: ${FILE_COUNT}"
          [ "${FILE_COUNT}" -gt 0 ] || { echo "[E] no output files"; exit 1; }

      - name: Tar to Artifacts
        shell: bash
        run: |
          set -euo pipefail

          ROOT_PATH="${{ github.workspace }}"
          OUTPUT_DIR="${ROOT_PATH}/src/output/${{ matrix.platform }}-${{ matrix.kver }}"
          mkdir -p "${ROOT_PATH}/source"

          if [[ "${{ matrix.kver }}" == 5* ]]; then
            PACKAGE_NAME="${{ matrix.platform }}-${{ matrix.toolkit_ver }}-${{ matrix.kver }}.tgz"
          else
            PACKAGE_NAME="${{ matrix.platform }}-${{ matrix.kver }}.tgz"
          fi

          tar -zcf "${ROOT_PATH}/source/${PACKAGE_NAME}" -C "${OUTPUT_DIR}" .
          echo "[I] package: ${ROOT_PATH}/source/${PACKAGE_NAME}"

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.toolkit_ver }}-${{ matrix.kver }}
          path: |
            ${{ github.workspace }}/source/*.tgz
