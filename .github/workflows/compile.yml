# version: [ 7.1, 7.2 ]
# platform: [ apollolake, broadwell, broadwellnk, bromolow, denverton, epyc7002, geminilake, purley, r1000, v1000 ]
# exclude:
#   - version: 7.1
#     platform: broadwell
# include:
#   - version: "7.2"
#     platform: "broadwell"

name: Compile Modules

on:  
  workflow_dispatch:
    inputs:
      version:
        description: 'format %y.%-m.$i or auto'
        required: false
        type: string

jobs:
  build:
    strategy:
      matrix:
        include:
          - version: 7.1 
            platform: apollolake
            parm: "4.4.180"
          - version: 7.1
            platform: broadwell
            parm: "4.4.180"
          - version: 7.1 
            platform: broadwellnk
            parm: "4.4.180"
          - version: 7.1 
            platform: broadwellnkv2
            parm: "4.4.180"
          - version: 7.1
            platform: denverton
            parm: "4.4.180"
          - version: 7.1
            platform: epyc7002
            parm: "5.10.55"
          - version: 7.1 
            platform: geminilake
            parm: "4.4.180"
          - version: 7.1 
            platform: purley
            parm: "4.4.180"
          - version: 7.1
            platform: r1000
            parm: "4.4.180"
          - version: 7.1
            platform: v1000
            parm: "4.4.180"

          - version: 7.2 
            platform: apollolake
            parm: "4.4.302"
          - version: 7.2
            platform: broadwell
            parm: "4.4.302"
          - version: 7.2 
            platform: broadwellnk
            parm: "4.4.302"
          - version: 7.2 
            platform: broadwellnkv2
            parm: "4.4.302"
          - version: 7.2
            platform: denverton
            parm: "4.4.302"
          - version: 7.2
            platform: epyc7002
            parm: "5.10.55"
          - version: 7.2 
            platform: geminilake
            parm: "4.4.302"
          - version: 7.2 
            platform: purley
            parm: "4.4.302"
          - version: 7.2
            platform: r1000
            parm: "4.4.302"
          - version: 7.2
            platform: v1000
            parm: "4.4.302"

          - version: 7.3
            platform: epyc7002
            parm: "5.10.55"
          - version: 7.3
            platform: geminilakenk
            parm: "5.10.55"
          - version: 7.3
            platform: r1000nk
            parm: "5.10.55"
          - version: 7.3
            platform: v1000nk
            parm: "5.10.55"

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Init Env
        run: |
          git config --global user.email "info@auxxxilium.tech"
          git config --global user.name "AuxXxilium"
          sudo timedatectl set-timezone "Europe/Berlin" 
          
      - name: Get EnvDeploy
        run: |
          ROOT_PATH=${{ github.workspace }}

          git clone https://github.com/SynologyOpenSource/pkgscripts-ng.git ${ROOT_PATH}/pkgscripts-ng
          cd ${ROOT_PATH}/pkgscripts-ng
          git checkout DSM${{ matrix.version }}
          sudo ./EnvDeploy -v ${{ matrix.version }} -l  # Get Available platforms
          sudo ./EnvDeploy -q -v ${{ matrix.version }} -p ${{ matrix.platform }}

          #ENV
          mkdir -p ${ROOT_PATH}/source

          ENV_PATH=${ROOT_PATH}/build_env/ds.${{ matrix.platform }}-${{ matrix.version }}
          sudo cp -al ${ROOT_PATH}/pkgscripts-ng ${ENV_PATH}/

          sudo chroot ${ENV_PATH} << "EOF"
          cd pkgscripts

          version=${{ matrix.version }}; [ ${version:0:1} -gt 6 ] && sed -i 's/print(" ".join(kernels))/pass #&/' ProjectDepends.py
          sed -i '/PLATFORM_FAMILY/a\\techo "PRODUCT=$PRODUCT" >> $file\n\techo "KSRC=$KERNEL_SEARCH_PATH" >> $file\n\techo "LINUX_SRC=$KERNEL_SEARCH_PATH" >> $file' include/build
          ./SynoBuild -c -p ${{ matrix.platform }}

          while read line; do if [ ${line:0:1} != "#" ]; then export ${line%%=*}="${line#*=}"; fi; done < /env${BUILD_ARCH}.mak
          if [ -f "${KSRC}/Makefile" ]; then
            # gcc issue "unrecognized command-line option '--param=allow-store-data-races=0'".
            # DSM 7.2/7.3 toolchain on GitHub runner may not support this param, patch kernel Makefile flags.
            if [ "${{ matrix.version }}" = "7.2" ] || [ "${{ matrix.version }}" = "7.3" ]; then
              sed -i 's/--param=allow-store-data-races=0/--allow-store-data-races/g' ${KSRC}/Makefile
            fi

            VERSION=`cat ${KSRC}/Makefile | grep ^VERSION | awk -F' ' '{print $3}'`
            PATCHLEVEL=`cat ${KSRC}/Makefile | grep ^PATCHLEVEL | awk -F' ' '{print $3}'`
            SUBLEVEL=`cat ${KSRC}/Makefile | grep ^SUBLEVEL | awk -F' ' '{print $3}'`
            [ -f "/env32.mak" ] && echo "KVER=${VERSION}.${PATCHLEVEL}.${SUBLEVEL}" >> /env32.mak
            [ -f "/env64.mak" ] && echo "KVER=${VERSION}.${PATCHLEVEL}.${SUBLEVEL}" >> /env64.mak
            CCVER=`$CC --version | head -n 1 | awk -F' ' '{print $3}'`
            [ -f "/env32.mak" ] && echo "CCVER=${CCVER}" >> /env32.mak
            [ -f "/env64.mak" ] && echo "CCVER=${CCVER}" >> /env64.mak
          fi
          EOF
          
          [ -f ${ENV_PATH}/env64.mak ] && ENV_FILE=${ENV_PATH}/env64.mak || ([ -f ${ENV_PATH}/env32.mak ] && ENV_FILE=${ENV_PATH}/env32.mak)
          if [ -n "${ENV_FILE}" ]; then
            KVER=`grep 'KVER=' ${ENV_FILE} | awk -F'=' '{print $2}'`
            CCVER=`grep 'CCVER=' ${ENV_FILE} | awk -F'=' '{print $2}'`
            [ -n "${KVER}" ] && echo "KVER=${KVER}" >> $GITHUB_ENV
            [ -n "${CCVER}" ] && echo "CCVER=${CCVER}" >> $GITHUB_ENV
          fi

      - name: Get Src
        run: |
          ROOT_PATH=${{ github.workspace }}

          mkdir -p ${ROOT_PATH}/source/output
          repo=${{ env.repo }}
          KVER=${{ env.KVER }}

          sudo cp -a ${ROOT_PATH}/src/${KVER:0:1}.x ${ROOT_PATH}/source/input

          # epyc7002 白名单（优先使用 thirdparty 目录中的已验证模块名）
          if [ "${{ matrix.platform }}" = "epyc7002" ]; then
            THIRD="${ROOT_PATH}/thirdparty/${{ matrix.platform }}-${{ matrix.version }}-${{ matrix.parm }}"
            if [ -d "${THIRD}" ]; then
              ls "${THIRD}"/*.ko 2>/dev/null \
                | xargs -n1 basename \
                | sed 's/\.ko$//' \
                | sort -u \
                | grep -Ev '^(ttm|drm.*|i915.*|intel-gtt|hdmi|dmabuf|apex|gasket|intel_auxiliary|intel_idle|intel-lpss|mvsas|mpt3sas|mptbase|mptctl|mptsas|mptscsih|mptspi|megaraid.*|mei.*)$' \
                > ${ROOT_PATH}/source/whitelist.txt || true
              echo "[I] whitelist count (filtered): $(wc -l < ${ROOT_PATH}/source/whitelist.txt 2>/dev/null || echo 0)"
            fi
          fi

          sudo cp -a ${ROOT_PATH}/source ${ROOT_PATH}/build_env/ds.${{ matrix.platform }}-${{ matrix.version }}/

      - name: Make
        run: |
          ROOT_PATH=${{ github.workspace }}

          sudo chroot build_env/ds.${{ matrix.platform }}-${{ matrix.version }} << "EOF"
          set -e
          sed -i 's/^CFLAGS=/#CFLAGS=/g; s/^CXXFLAGS=/#CXXFLAGS=/g' /env${BUILD_ARCH}.mak
          while read line; do if [ ${line:0:1} != "#" ]; then export ${line%%=*}="${line#*=}"; fi; done < /env${BUILD_ARCH}.mak
          cd /source/input
          [ -z "`grep 'env.mak' Makefile`" ] && sed -i '1 i include /env.mak' Makefile

          if [ -f "defines.${{ matrix.platform }}" ]; then
            PARMS="`cat "defines.${{ matrix.platform }}" | xargs`"
          else
            echo "[E] ${{ matrix.platform }}-${{ matrix.version }}"
            exit 1
          fi

          if [ "${{ matrix.platform }}" = "epyc7002" ] && [ -s "/source/whitelist.txt" ]; then
            echo "[I] whitelist compile mode for epyc7002"
            while read MOD; do
              [ -z "${MOD}" ] && continue
              MOD_SAFE="${MOD//-/_}"

              # Makefile 里有的模块名用 '-'，有的用 '_'，两种都尝试
              MF=$(grep -Rsl --include=Makefile -E "(^|[[:space:]])(${MOD}\.o|${MOD_SAFE}\.o)([[:space:]]|$)" /source/input | head -n1 || true)
              if [ -z "${MF}" ]; then
                echo "[W] skip ${MOD}: Makefile entry not found"
                continue
              fi
              MODDIR=$(dirname "${MF}")

              OBJ_NAME=""
              if grep -Eq "(^|[[:space:]])${MOD}\.o([[:space:]]|$)" "${MF}"; then
                OBJ_NAME="${MOD}"
              elif grep -Eq "(^|[[:space:]])${MOD_SAFE}\.o([[:space:]]|$)" "${MF}"; then
                OBJ_NAME="${MOD_SAFE}"
              fi

              [ -z "${OBJ_NAME}" ] && { echo "[W] skip ${MOD}: cannot resolve obj name"; continue; }

              echo "[I] build ${MOD} (obj=${OBJ_NAME}) in ${MODDIR}"
              make -j`nproc` -C "${KSRC}" M="${MODDIR}" ${PARMS} "${OBJ_NAME}.ko" || {
                echo "[W] build failed for ${MOD}, skip"
                continue
              }

              if [ -f "${MODDIR}/${OBJ_NAME}.ko" ]; then
                strip -g "${MODDIR}/${OBJ_NAME}.ko" || true
                echo "Copying ${OBJ_NAME}.ko"
                cp "${MODDIR}/${OBJ_NAME}.ko" "/source/output"
              fi
            done < /source/whitelist.txt
          else
            make -j`nproc` -C "${KSRC}" M="${PWD}" ${PARMS} modules
            while read F; do
              strip -g "${F}"
              echo "Copying `basename ${F}`"
              cp "${F}" "/source/output"
            done < <(find ${PWD} -name \*.ko)
          fi
          EOF

          sudo cp -a ${ROOT_PATH}/build_env/ds.${{ matrix.platform }}-${{ matrix.version }}/source/output ${ROOT_PATH}/source/
          sudo chmod a+rw -R ${ROOT_PATH}/source/output

          KO_COUNT=$(find ${ROOT_PATH}/source/output -maxdepth 1 -name '*.ko' | wc -l)
          echo "[I] KO count: ${KO_COUNT}"
          [ "${KO_COUNT}" -gt 0 ] || { echo "[E] no .ko generated"; exit 1; }

      - name: Tar to Artifacts
        run: |
          if [ ! -d "${{ github.workspace }}/source/output" ]; then
            mkdir -p "${{ github.workspace }}/source/output"
            chmod a+rw -R "${{ github.workspace }}/source/output"
          fi

          if [ "${{ matrix.platform }}" = "epyc7002" ]; then
            tar caf ${{ github.workspace }}/source/${{ matrix.platform }}-${{ matrix.version }}-${{ matrix.parm }}.tgz -C ${{ github.workspace }}/source/output .
          else
            tar caf ${{ github.workspace }}/source/${{ matrix.platform }}-${{ matrix.parm }}.tgz -C ${{ github.workspace }}/source/output .
          fi

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.version }}-${{ matrix.parm }}
          path: |
            ${{ github.workspace }}/source/*.tgz
            
      - name: clean
        run: |
          sudo rm -rf ${{ github.workspace }}/build_env/ds.${{ matrix.platform }}-${{ matrix.version }}/source/*